<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Birthday & Love</title>
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

<style>
    * { box-sizing: border-box; }

    html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
    }

    body {
        font-family: 'Mali', sans-serif;
        text-align: center;
        background-color: #f9f9f9;
    }

    .page {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        min-height: 100svh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        padding: 20px;
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
        overflow: hidden;

        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        z-index: 0;
        transition: opacity 0.55s ease, visibility 0s linear 0.55s;
    }

    .page.active {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        z-index: 1;
        transition: opacity 0.55s ease;
    }

    #p1, #p2, #p3 {
        background-color: #ffe7ef;
    }

    #p1 { background-image: url('https://i.postimg.cc/xdL1NZCP/PPLM_01.png'); }
    #p2 { background-image: url('https://i.postimg.cc/QMcdKztg/PPLM_02.png'); }
    #p3 { background-image: url('https://i.postimg.cc/s25gGLX9/PPLM_03.png'); }

    .pink-bg { background-color: #ffd1dc; }
    .white-bg { background-color: #ffffff; }

    h2 {
        font-size: 22px;
        color: #333;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        padding: 15px 25px;
        border-radius: 20px;
        max-width: 90%;
        line-height: 1.6;
        margin: 0;
        position: relative;
        z-index: 2;
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
    }

    /* หน้า 2 และ 3 โปร่งใสขึ้น */
    #p2 h2,
    #p3 h2 {
        background: rgba(255, 255, 255, 0.7);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        backdrop-filter: blur(1px);
        -webkit-backdrop-filter: blur(1px);
    }

    .btn-container {
        display: flex;
        gap: 15px;
        margin-top: 20px;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        position: relative;
        z-index: 2;
    }

    button {
        padding: 12px 24px;
        font-size: 18px;
        font-family: 'Mali', sans-serif;
        font-weight: 600;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
    }

    .btn-normal { background: #ffffff; color: #333; border: 1px solid #ddd; }
    .btn-good { background: #ffb6c1; color: #fff; }
    .btn-green { background: #4CAF50; color: white; }
    .btn-red { background: #f44336; color: white; z-index: 10; }

    .tap-hint {
        margin-top: 14px;
        font-size: 14px;
        color: #555;
        background: rgba(255,255,255,0.45);
        padding: 8px 14px;
        border-radius: 999px;
        position: relative;
        z-index: 2;
    }

    #p2, #p3 {
        cursor: pointer;
    }

    #text {
        opacity: 0;
        transition: opacity 0.35s ease-in-out;
        min-height: 3.2em;
    }

    #text.show {
        opacity: 1;
    }

    #text:empty {
        background: transparent;
        box-shadow: none;
        padding: 0;
    }

    .emoji-bg {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 0;
    }

    .final-text {
        color: black;
        background: rgba(255,255,255,1);
        box-shadow: none;
        position: relative;
        z-index: 2;
    }

    .love-emoji {
        position: absolute;
        user-select: none;
        will-change: transform;
        animation-name: bounceAround;
        animation-timing-function: ease-in-out;
        animation-iteration-count: infinite;
        opacity: 0.9;
        filter: drop-shadow(0 4px 8px rgba(0,0,0,0.08));
    }

    @keyframes bounceAround {
        0%   { transform: translate(0px, 0px) scale(1) rotate(0deg); }
        20%  { transform: translate(18px, -24px) scale(1.08) rotate(-6deg); }
        40%  { transform: translate(-16px, -42px) scale(0.96) rotate(6deg); }
        60%  { transform: translate(22px, 12px) scale(1.1) rotate(-4deg); }
        80%  { transform: translate(-20px, 26px) scale(0.98) rotate(5deg); }
        100% { transform: translate(0px, 0px) scale(1) rotate(0deg); }
    }
</style>
</head>
<body>

<div id="p1" class="page active">
    <h2>สวัสดีโลมา วันนี้เป็นไงบ้าง? HBD นะคะ</h2>
    <div class="btn-container">
        <button class="btn-normal" onclick="next()">ปกตินะ</button>
        <button class="btn-good" onclick="next()">ดีมากเลย</button>
    </div>
</div>

<div id="p2" class="page">
    <h2>โตขึ้นมากเลยนะโลมา จากเด็กน้อยในวันนั้น เติบโตมาเป็นคนสวยและเก่งในวันนี้</h2>
    <div class="tap-hint">แตะหน้าจอเพื่อไปต่อ</div>
</div>

<div id="p3" class="page">
    <h2 id="text"></h2>
    <div class="tap-hint">แตะหน้าจอเพื่ออ่านข้อความถัดไป</div>
</div>

<div id="p4" class="page pink-bg">
    <h2>เป็นแฟนกันไม๊?</h2>
    <div class="btn-container" style="width:100%; height:120px;">
        <button class="btn-green" onclick="next()">เป็นค่ะ!</button>
        <button class="btn-red" id="no">อาจจะยังนะ</button>
    </div>
</div>

<div id="p5" class="page pink-bg">
    <div class="emoji-bg" id="emoji-bg"></div>
    <h2 class="final-text">ขอแสดงความยินดีด้วยคุณโลมา คุณไม่โสดแล้วววว!! รักคั๊บ!</h2>
</div>

<script>
let current = 1;
let page3Index = 0;
let page3Busy = false;

const page3Lines = [
    "25 ขวบแล้วสินะคนเก่ง ขอบคุณพ่อแม่โลมาที่ทำให้มีโลมาที่น่ารักบนโลกใบนี้",
    "ขอบคุณโลมาที่ดูแลตัวเองมาอย่างดีเสมอ ตลอด 24 ปีที่ผ่านมา.. ขอให้โลมามีความสุขตลอดไป",
    "หลังจากนี้.. เราขอดูแลโลมาได้ไม๊?.."
];

function show(n) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const target = document.getElementById('p' + n);
    if (target) target.classList.add('active');

    if (n === 3) {
        initPage3();
    }

    if (n === 5) {
        createLoveEmojiBackground();
    }
}

function next() {
    if (current >= 5) return;
    current++;
    show(current);
}

function initPage3() {
    page3Index = 0;
    page3Busy = false;
    const el = document.getElementById('text');
    el.classList.remove('show');
    el.textContent = page3Lines[0];

    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            el.classList.add('show');
        });
    });
}

function nextPage3Text() {
    if (current !== 3 || page3Busy) return;

    const el = document.getElementById('text');

    if (page3Index >= page3Lines.length - 1) {
        next();
        return;
    }

    page3Busy = true;
    el.classList.remove('show');

    setTimeout(() => {
        page3Index++;
        el.textContent = page3Lines[page3Index];
        el.classList.add('show');
        page3Busy = false;
    }, 220);
}

function handleTapPage2() {
    if (current === 2) next();
}

function handleTapPage3() {
    if (current === 3) nextPage3Text();
}

document.getElementById('p2').addEventListener('click', handleTapPage2);
document.getElementById('p3').addEventListener('click', handleTapPage3);

document.getElementById('p2').addEventListener('touchend', function(e) {
    e.preventDefault();
    handleTapPage2();
}, { passive: false });

document.getElementById('p3').addEventListener('touchend', function(e) {
    e.preventDefault();
    handleTapPage3();
}, { passive: false });

const noBtn = document.getElementById('no');

function moveBtn(e) {
    if (e.type === 'touchstart') e.preventDefault();

    const maxX = window.innerWidth - noBtn.offsetWidth - 20;
    const maxY = window.innerHeight - noBtn.offsetHeight - 20;

    const x = Math.max(20, Math.random() * maxX);
    const y = Math.max(20, Math.random() * maxY);

    noBtn.style.position = 'fixed';
    noBtn.style.left = x + 'px';
    noBtn.style.top = y + 'px';
}

noBtn.addEventListener('touchstart', moveBtn, { passive: false });
noBtn.addEventListener('mouseover', moveBtn);
noBtn.addEventListener('click', moveBtn);

function createLoveEmojiBackground() {
    const container = document.getElementById('emoji-bg');
    if (!container) return;

    container.innerHTML = '';

    const emojis = ['🥰', '😍', '😊', '💖', '💕', '💗'];
    const total = 10;

    for (let i = 0; i < total; i++) {
        const item = document.createElement('span');
        item.className = 'love-emoji';
        item.textContent = emojis[Math.floor(Math.random() * emojis.length)];

        const left = Math.random() * 100;
        const top = Math.random() * 100;
        const size = 22 + Math.random() * 20;
        const duration = 3.5 + Math.random() * 3.5;
        const delay = Math.random() * 2;

        item.style.left = left + '%';
        item.style.top = top + '%';
        item.style.fontSize = size + 'px';
        item.style.animationDuration = duration + 's';
        item.style.animationDelay = delay + 's';

        container.appendChild(item);
    }
}

window.addEventListener('resize', () => {
    if (current === 5) createLoveEmojiBackground();
});
</script>
</body>
</html>
